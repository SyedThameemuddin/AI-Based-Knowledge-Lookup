openapi: 3.0.3
info:
  title: FindX — AI Based Knowledge Lookup API
  description: |
    A REST API for the FindX AI Knowledge Lookup Chatbot.

    FindX allows users to upload structured data files (Excel, CSV, TXT) and query them
    using natural language. Powered by a RAG (Retrieval-Augmented Generation) pipeline
    using FAISS vector search and Groq's Llama 3.1 LLM.

    ## Features
    - **Semantic Search** — Understands meaning, not just keywords
    - **Grounded Answers** — AI answers only from your data with source citations
    - **Multi-Format Upload** — Supports `.xlsx`, `.xls`, `.csv`, `.txt`
    - **Instant Responses** — Sub-2-second query responses via Groq

    ## Tech Stack
    - **Backend:** FastAPI (Python)
    - **Vector DB:** FAISS (by Meta)
    - **Embedding:** SentenceTransformers (all-MiniLM-L6-v2)
    - **LLM:** Llama 3.1 8B Instant (via Groq API)

  version: 1.0.0
  contact:
    name: Syed Thameemuddin
    url: https://github.com/SyedThameemuddin/AI-Based-Knowledge-Lookup

servers:
  - url: http://localhost:8000
    description: Development Server

tags:
  - name: Knowledge Lookup
    description: |
      Query your knowledge base, upload new data files, check system health,
      and retrieve query history.

paths:

  # ── POST /api/v1/query ──────────────────────────────────────────
  /api/v1/query:
    post:
      tags:
        - Knowledge Lookup
      summary: Query the Knowledge Base
      description: |
        Ask a natural language question against the uploaded knowledge base.
        The system uses semantic search (FAISS) to retrieve relevant documents,
        then generates an AI-powered answer using Groq's Llama 3.1 LLM.

        The response includes the answer, source citations with document IDs
        and relevance distances, and the total document count.
      operationId: queryKnowledgeBase
      requestBody:
        required: true
        description: The user's natural language query and retrieval parameters
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/QueryRequest'
            examples:
              delayedShipments:
                summary: Ask about delayed shipments
                value:
                  user_query: "Which shipments are delayed?"
                  top_k: 3
              specificShipment:
                summary: Check status of a specific shipment
                value:
                  user_query: "What is the status of shipment SHP001?"
                  top_k: 3
              carrierQuery:
                summary: Get carrier information
                value:
                  user_query: "Show me all carriers and their shipment count"
                  top_k: 5
              highestValue:
                summary: Find highest value shipment
                value:
                  user_query: "What is the highest value shipment?"
                  top_k: 3

      responses:
        '200':
          description: Query answered successfully with AI-generated response and source citations
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QuerySuccessResponse'
              examples:
                delayedShipmentsResponse:
                  summary: Delayed shipments found
                  value:
                    data:
                      answer: "Based on the provided context, the following shipments are delayed:\n\n1. **SHP003**\n   - Status: Delayed\n   - Carrier: DHL\n   - Origin: Boston\n   - Destination: Denver\n   - Delivery Date: 2024-01-14\n   - Remarks: Weather delay\n\n2. **SHP007**\n   - Status: Delayed\n   - Carrier: DHL\n   - Origin: Dallas\n   - Destination: Orlando\n   - Delivery Date: 2024-01-16\n   - Remarks: Traffic congestion"
                      sources:
                        - text: "shipment_id: SHP003. status: Delayed. carrier: DHL. origin: Boston. destination: Denver. delivery_date: 2024-01-14. weight: 8.2. value: 950.0. remarks: Weather delay"
                          document_id: "SHP003"
                          distance: 0.6543
                        - text: "shipment_id: SHP007. status: Delayed. carrier: DHL. origin: Dallas. destination: Orlando. delivery_date: 2024-01-16. weight: 3.1. value: 280.0. remarks: Traffic congestion"
                          document_id: "SHP007"
                          distance: 0.8921
                        - text: "shipment_id: SHP004. status: Processing. carrier: USPS. origin: Chicago. destination: Houston. delivery_date: 2024-01-12. weight: 22.0. value: 3200.0. remarks: Fragile contents"
                          document_id: "SHP004"
                          distance: 1.0234
                      query: "Which shipments are delayed?"
                      document_count: 10
                    errors: []
                    status_code: 200
                    request_id: "b5c0aa9c-2aa8-49fa-a2ad-2ee5193bc94d"
                    message: "Query answered successfully"

                noDataResponse:
                  summary: Answer not found in knowledge base
                  value:
                    data:
                      answer: "I don't have enough information to answer that question based on the available data. The knowledge base contains shipment records, but does not include information about employee salaries."
                      sources:
                        - text: "shipment_id: SHP001. status: In Transit. carrier: FedEx. origin: New York. destination: Los Angeles."
                          document_id: "SHP001"
                          distance: 1.8432
                      query: "What are the employee salaries?"
                      document_count: 10
                    errors: []
                    status_code: 200
                    request_id: "ac18cc2c-a7ca-437b-a731-3f1544693e0d"
                    message: "Query answered successfully"

        '400':
          description: Bad request — knowledge base not loaded or invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                indexNotLoaded:
                  summary: Knowledge base not loaded yet
                  value:
                    data: null
                    errors:
                      - code: "INTERNAL_SERVER_ERROR"
                        message: "Knowledge base is not loaded yet. Please upload a file via POST /api/v1/upload first."
                        error_code_id: "KB_RAG_001"
                    status_code: 400
                    request_id: "d4e5f6a7-b8c9-4d0e-a1f2-3456789abcde"
                    message: "Knowledge base is not loaded yet. Please upload a file via POST /api/v1/upload first."

        '422':
          description: Validation error — missing or invalid fields
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
              example:
                detail:
                  - loc: ["body", "user_query"]
                    msg: "field required"
                    type: "value_error.missing"

        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                data: null
                errors:
                  - code: "INTERNAL_SERVER_ERROR"
                    message: "Router error: unexpected failure in query pipeline"
                    error_code_id: "KB_ROUTE_001"
                status_code: 500
                request_id: "f1a2b3c4-d5e6-4f7a-8b9c-0d1e2f3a4b5c"
                message: "Router error: unexpected failure in query pipeline"

  # ── POST /api/v1/upload ─────────────────────────────────────────
  /api/v1/upload:
    post:
      tags:
        - Knowledge Lookup
      summary: Upload a File to Index
      description: |
        Upload an Excel (.xlsx, .xls), CSV (.csv), or text (.txt) file to
        build or replace the FAISS vector index.

        **Processing pipeline:**
        1. File is parsed and each row is converted to a descriptive text sentence
        2. Text chunks are embedded using SentenceTransformers (all-MiniLM-L6-v2)
        3. Embeddings are stored in a FAISS IndexFlatL2 index
        4. The RAG engine is reloaded with the new index

        **Note:** Uploading a new file replaces the existing knowledge base entirely.
      operationId: uploadFile
      requestBody:
        required: true
        description: The data file to upload and index
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
              properties:
                file:
                  type: string
                  format: binary
                  description: |
                    The file to upload. Supported formats:
                    - `.xlsx`, `.xls` — Excel spreadsheets (each row becomes a document)
                    - `.csv` — Comma-separated value files
                    - `.txt` — Plain text files (split into 500-char chunks)

      responses:
        '200':
          description: File uploaded and indexed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UploadSuccessResponse'
              examples:
                excelUpload:
                  summary: Excel file with 10 shipment records
                  value:
                    data:
                      document_count: 10
                      status: "success"
                      message: "Successfully indexed 10 documents from shipments.xlsx"
                    errors: []
                    status_code: 200
                    request_id: "a1b2c3d4-e5f6-4a7b-8c9d-0e1f2a3b4c5d"
                    message: "Successfully indexed 10 documents from shipments.xlsx"

                csvUpload:
                  summary: CSV file with 500 student records
                  value:
                    data:
                      document_count: 500
                      status: "success"
                      message: "Successfully indexed 500 documents from students.csv"
                    errors: []
                    status_code: 200
                    request_id: "b2c3d4e5-f6a7-4b8c-9d0e-1f2a3b4c5d6e"
                    message: "Successfully indexed 500 documents from students.csv"

        '400':
          description: Bad request — unsupported file type or empty file
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                data: null
                errors:
                  - code: "INTERNAL_SERVER_ERROR"
                    message: "Unsupported file type: .pdf. Supported: .xlsx, .xls, .csv, .txt"
                    error_code_id: "KB_UPLOAD_001"
                status_code: 400
                request_id: "c3d4e5f6-a7b8-4c9d-0e1f-2a3b4c5d6e7f"
                message: "Unsupported file type: .pdf. Supported: .xlsx, .xls, .csv, .txt"

        '500':
          description: Internal server error during file processing
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                data: null
                errors:
                  - code: "INTERNAL_SERVER_ERROR"
                    message: "Upload error: failed to parse file"
                    error_code_id: "KB_ROUTE_002"
                status_code: 500
                request_id: "d4e5f6a7-b8c9-4d0e-a1f2-3456789abcde"
                message: "Upload error: failed to parse file"

  # ── GET /api/v1/health ──────────────────────────────────────────
  /api/v1/health:
    get:
      tags:
        - Knowledge Lookup
      summary: System Health Check
      description: |
        Returns the current status of the RAG engine including:
        - Whether the FAISS index is loaded
        - Number of documents in the index
        - Active embedding model name
        - Active LLM model name
      operationId: healthCheck
      responses:
        '200':
          description: System is healthy and operational
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthSuccessResponse'
              examples:
                engineLoaded:
                  summary: Engine loaded with 10 documents
                  value:
                    data:
                      status: "ok"
                      rag_engine:
                        index_loaded: true
                        document_count: 10
                        embedding_model: "all-MiniLM-L6-v2"
                        llm_model: "llama-3.1-8b-instant"
                    errors: []
                    status_code: 200
                    request_id: "e5f6a7b8-c9d0-4e1f-2a3b-4c5d6e7f8a9b"
                    message: "System healthy"

                engineNotLoaded:
                  summary: Engine initialized but no index loaded
                  value:
                    data:
                      status: "ok"
                      rag_engine:
                        index_loaded: false
                        document_count: 0
                        embedding_model: "all-MiniLM-L6-v2"
                        llm_model: "llama-3.1-8b-instant"
                    errors: []
                    status_code: 200
                    request_id: "f6a7b8c9-d0e1-4f2a-3b4c-5d6e7f8a9b0c"
                    message: "System healthy"

        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "error"
                  message:
                    type: string
                    example: "RAG engine failed to initialize"

  # ── GET /api/v1/history ─────────────────────────────────────────
  /api/v1/history:
    get:
      tags:
        - Knowledge Lookup
      summary: Get Query History
      description: |
        Retrieves the last 50 queries made to the system (newest first).
        History is stored in-memory and is cleared on server restart.

        Each entry includes:
        - The original query text
        - A preview of the AI-generated answer (max 120 characters)
        - The number of source documents retrieved
      operationId: getQueryHistory
      responses:
        '200':
          description: Query history retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HistorySuccessResponse'
              examples:
                withHistory:
                  summary: History with recent queries
                  value:
                    data:
                      - query: "Which shipments are delayed?"
                        answer_preview: "Based on the provided context, the following shipments are delayed: 1. SHP003 - Status: Delayed, Car..."
                        source_count: 3
                      - query: "What is the status of SHP001?"
                        answer_preview: "The status of shipment SHP001 is **In Transit**. It is being carried by FedEx from New York to Los ..."
                        source_count: 3
                      - query: "Show me all carriers"
                        answer_preview: "Based on the available data, the carriers are: DHL, FedEx, UPS, USPS, and Blue Dart."
                        source_count: 3
                    errors: []
                    status_code: 200
                    request_id: "a7b8c9d0-e1f2-4a3b-4c5d-6e7f8a9b0c1d"
                    message: "Query history retrieved"

                emptyHistory:
                  summary: No queries have been made yet
                  value:
                    data: []
                    errors: []
                    status_code: 200
                    request_id: "b8c9d0e1-f2a3-4b4c-5d6e-7f8a9b0c1d2e"
                    message: "Query history retrieved"

        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "error"
                  message:
                    type: string
                    example: "Failed to retrieve history"


# ══════════════════════════════════════════════════════════════════
# COMPONENTS
# ══════════════════════════════════════════════════════════════════
components:
  schemas:

    # ── Request Schemas ─────────────────────────────────────────
    QueryRequest:
      type: object
      description: Request payload for querying the knowledge base
      required:
        - user_query
      properties:
        user_query:
          type: string
          description: The natural language question to ask
          example: "Which shipments are delayed?"
        top_k:
          type: integer
          description: Number of source documents to retrieve (1-10)
          default: 3
          minimum: 1
          maximum: 10
          example: 3

    # ── Response Schemas ────────────────────────────────────────
    APIResponse:
      type: object
      description: Standardized API response wrapper used for all endpoints
      properties:
        data:
          description: Response payload (varies by endpoint)
        errors:
          type: array
          description: List of errors (empty on success)
          items:
            $ref: '#/components/schemas/Error'
        status_code:
          type: integer
          description: HTTP status code
          example: 200
        request_id:
          type: string
          format: uuid
          description: Unique request identifier for tracing
          example: "b5c0aa9c-2aa8-49fa-a2ad-2ee5193bc94d"
        message:
          type: string
          description: Human-readable summary message
          example: "Success"

    # ── Query Response Data ─────────────────────────────────────
    QuerySuccessResponse:
      allOf:
        - $ref: '#/components/schemas/APIResponse'
        - type: object
          properties:
            data:
              type: object
              properties:
                answer:
                  type: string
                  description: AI-generated answer grounded in the knowledge base
                sources:
                  type: array
                  description: Source documents used to generate the answer
                  items:
                    $ref: '#/components/schemas/Source'
                query:
                  type: string
                  description: The original user query (echoed back)
                document_count:
                  type: integer
                  description: Total documents in the FAISS index

    Source:
      type: object
      description: A source document retrieved from the FAISS index
      properties:
        text:
          type: string
          description: The full text of the retrieved document
          example: "shipment_id: SHP003. status: Delayed. carrier: DHL. origin: Boston."
        document_id:
          type: string
          description: Unique identifier of the source document
          example: "SHP003"
        distance:
          type: number
          format: float
          description: L2 distance from the query vector (lower = more relevant)
          example: 0.6543

    # ── Upload Response Data ────────────────────────────────────
    UploadSuccessResponse:
      allOf:
        - $ref: '#/components/schemas/APIResponse'
        - type: object
          properties:
            data:
              type: object
              properties:
                document_count:
                  type: integer
                  description: Number of documents indexed from the file
                  example: 10
                status:
                  type: string
                  description: Upload result status
                  enum: [success, error]
                  example: "success"
                message:
                  type: string
                  description: Human-readable upload result
                  example: "Successfully indexed 10 documents from shipments.xlsx"

    # ── Health Response Data ────────────────────────────────────
    HealthSuccessResponse:
      allOf:
        - $ref: '#/components/schemas/APIResponse'
        - type: object
          properties:
            data:
              type: object
              properties:
                status:
                  type: string
                  description: Overall system status
                  example: "ok"
                rag_engine:
                  type: object
                  description: RAG engine status details
                  properties:
                    index_loaded:
                      type: boolean
                      description: Whether the FAISS index is loaded
                      example: true
                    document_count:
                      type: integer
                      description: Number of documents in the index
                      example: 10
                    embedding_model:
                      type: string
                      description: Name of the active embedding model
                      example: "all-MiniLM-L6-v2"
                    llm_model:
                      type: string
                      description: Name of the active LLM model
                      example: "llama-3.1-8b-instant"

    # ── History Response Data ───────────────────────────────────
    HistorySuccessResponse:
      allOf:
        - $ref: '#/components/schemas/APIResponse'
        - type: object
          properties:
            data:
              type: array
              description: List of recent queries (newest first, max 50)
              items:
                $ref: '#/components/schemas/HistoryEntry'

    HistoryEntry:
      type: object
      description: A single query history entry
      properties:
        query:
          type: string
          description: The original user query
          example: "Which shipments are delayed?"
        answer_preview:
          type: string
          description: First 120 characters of the AI-generated answer
          example: "Based on the provided context, the following shipments are delayed: 1. SHP003..."
        source_count:
          type: integer
          description: Number of source documents retrieved for this query
          example: 3

    # ── Error Schemas ───────────────────────────────────────────
    Error:
      type: object
      description: Structured error detail
      properties:
        code:
          type: string
          description: Error category code
          example: "INTERNAL_SERVER_ERROR"
        message:
          type: string
          description: Human-readable error description
          example: "Knowledge base is not loaded yet. Please upload a file via POST /api/v1/upload first."
        error_code_id:
          type: string
          description: Unique error identifier for debugging
          example: "KB_RAG_001"

    ErrorResponse:
      allOf:
        - $ref: '#/components/schemas/APIResponse'
        - type: object
          properties:
            data:
              nullable: true
              example: null

    ValidationErrorResponse:
      type: object
      description: FastAPI/Pydantic validation error response
      properties:
        detail:
          type: array
          items:
            type: object
            properties:
              loc:
                type: array
                items:
                  type: string
                description: Location of the validation error
              msg:
                type: string
                description: Error message
              type:
                type: string
                description: Error type
